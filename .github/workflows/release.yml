name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.2.3)'
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.target_commitish }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Extract version from tag
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Update package versions
        run: ./scripts/update-version.sh ${{ steps.version.outputs.version }}

      - name: Install dependencies
        run: bun install

      - name: Prepare modules
        run: bun run dev:prepare

      - name: Build packages
        run: bun run build

      - name: Copy README to packages (if not exist)
        run: |
          for package_dir in packages/*/; do
            if [ ! -f "${package_dir}README.md" ]; then
              cp README.md "${package_dir}README.md"
            fi
          done

      - name: Replace workspace:* with actual versions for publish
        run: |
          VERSION=${{ steps.version.outputs.version }}
          node -e '
            const fs = require("fs");
            const version = process.argv[1];
            const dirs = ["packages/nuxt-auto-api", "packages/nuxt-auto-admin"];
            for (const dir of dirs) {
              const p = dir + "/package.json";
              const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
              for (const section of ["dependencies", "peerDependencies", "devDependencies"]) {
                if (!pkg[section]) continue;
                for (const [key, val] of Object.entries(pkg[section])) {
                  if (val === "workspace:*") pkg[section][key] = "^" + version;
                }
              }
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
            }
          ' "$VERSION"

      - name: Publish nuxt-auto-api to npm
        run: bunx npm publish --workspace=@websideproject/nuxt-auto-api --provenance --access public

      - name: Publish nuxt-auto-admin to npm
        run: bunx npm publish --workspace=@websideproject/nuxt-auto-admin --provenance --access public

      - name: Restore workspace:* after publish
        run: |
          VERSION=${{ steps.version.outputs.version }}
          node -e '
            const fs = require("fs");
            const version = process.argv[1];
            const dirs = ["packages/nuxt-auto-api", "packages/nuxt-auto-admin"];
            for (const dir of dirs) {
              const p = dir + "/package.json";
              const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
              for (const section of ["dependencies", "peerDependencies", "devDependencies"]) {
                if (!pkg[section]) continue;
                const workspacePkgs = ["@websideproject/nuxt-auto-api", "@websideproject/nuxt-auto-admin"];
                for (const [key, val] of Object.entries(pkg[section])) {
                  if (workspacePkgs.includes(key) && val === "^" + version) {
                    pkg[section][key] = "workspace:*";
                  }
                }
              }
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
            }
          ' "$VERSION"

      - name: Commit version updates
        run: |
          VERSION=${{ steps.version.outputs.version }}
          TARGET=${{ github.event.release.target_commitish || github.ref_name }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore: update versions to $VERSION [skip ci]" || echo "No changes to commit"
          git push origin HEAD:$TARGET || echo "No changes to push"
