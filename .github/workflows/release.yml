name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.2.3)'
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.release.target_commitish }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Extract version from tag
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Update package versions
        run: ./scripts/update-version.sh ${{ steps.version.outputs.version }}

      - name: Install dependencies
        run: bun install

      - name: Prepare modules
        run: bun run dev:prepare

      - name: Build packages
        run: bun run build

      - name: Publish nuxt-auto-api to npm
        run: bunx npm publish --workspace=@websideproject/nuxt-auto-api --provenance --access public

      - name: Publish nuxt-auto-admin to npm
        run: bunx npm publish --workspace=@websideproject/nuxt-auto-admin --provenance --access public

      - name: Commit version updates
        run: |
          VERSION=${{ steps.version.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore: update versions to $VERSION [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.event.release.target_commitish }} || echo "No changes to push"
