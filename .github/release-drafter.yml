name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '📦 API Module'
    labels:
      - 'nuxt-auto-api'
      - 'api'
  - title: '🎨 Admin Module'
    labels:
      - 'nuxt-auto-admin'
      - 'admin'
  - title: '📚 Documentation'
    labels:
      - 'documentation'
      - 'docs'
  - title: '🧰 Maintenance'
    labels:
      - 'chore'
      - 'dependencies'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'minor'
      - 'feature'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'bugfix'
      - 'chore'
      - 'dependencies'
  default: patch

template: |
  ## What's Changed

  This release includes updates for both `@websideproject/nuxt-auto-api` and `@websideproject/nuxt-auto-admin`.

  $CHANGES

  **Full Changelog**: https://github.com/websideproject/nuxt-auto/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
